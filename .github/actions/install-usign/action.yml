name: Install usign
description: >
  Builds OpenWrt's `usign` (the signify-compatible ed25519 signer opkg
  uses to verify package feeds) from source into /usr/local/bin. usign is
  dependency-free C — it bundles its own ed25519/sha512 — so this is just
  cmake + cc. The built binary is cached on the pinned commit.

inputs:
  ref:
    description: openwrt/usign git ref to build (pin a commit for reproducibility)
    required: false
    # git.openwrt.org/project/usign.git, mirrored at github.com/openwrt/usign.
    # usign changes rarely and the signing key — not the binary — is what
    # secures the feed, so tracking the default branch is acceptable. Pin a
    # commit SHA here if you want byte-reproducible builds.
    default: master

runs:
  using: composite
  steps:
    - name: Cache usign binary
      id: cache
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/usign
        key: usign-${{ inputs.ref }}-${{ runner.os }}

    - name: Install build dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y build-essential cmake

    - name: Checkout usign
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: openwrt/usign
        path: usign
        fetch-depth: 1
        ref: ${{ inputs.ref }}

    - name: Compile usign
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: usign
      run: |
        cmake -DCMAKE_BUILD_TYPE=Release .
        make
        sudo install -m 0755 usign /usr/local/bin/usign

    - name: Verify
      shell: bash
      run: usign 2>&1 | head -n1 || true
